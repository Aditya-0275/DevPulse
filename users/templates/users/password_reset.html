{% extends "DevQA/base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<div class="content-section">
    <form method="POST">
        {% csrf_token %}
        <fieldset class="form-group">
            <legend class="border-bottom mb-4">Reset Password</legend>
            {{ form|crispy }}
        </fieldset>
        <div class="form-group">
            <button class="btn btn-outline-info btn-sm mb-2" style="padding: 0.15rem 0.4rem; font-size: 0.75rem;"
                type="submit">Send Reset Link</button>
        </div>
    </form>
</div>
{% endblock content%}
